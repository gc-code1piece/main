<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember DB 실시간 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.8rem; color: #fff; margin-bottom: 4px; }
        .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 16px; }
        .live-dot { display: inline-block; width: 8px; height: 8px; background: #3fb950; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        .status-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; font-size: 0.8rem; color: #8b949e; }
        .refresh-btn { background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }

        /* Summary */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 24px; }
        .sum-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 12px; text-align: center; }
        .sum-card .num { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
        .sum-card .label { font-size: 0.7rem; color: #8b949e; }

        /* Layout */
        .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; height: calc(100vh - 220px); }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; height: auto; } }

        /* User List */
        .user-list { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow-y: auto; }
        .user-list-header { padding: 12px 16px; border-bottom: 1px solid #30363d; font-size: 0.85rem; font-weight: 600; color: #fff; position: sticky; top: 0; background: #161b22; z-index: 1; }
        .user-item { padding: 10px 16px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.15s; }
        .user-item:hover { background: #1c2128; }
        .user-item.active { background: #1c2128; border-left: 3px solid #58a6ff; }
        .user-item .name { font-size: 0.88rem; font-weight: 600; color: #fff; }
        .user-item .info { font-size: 0.72rem; color: #8b949e; margin-top: 2px; }
        .user-item .badges { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }

        /* Detail Panel */
        .detail-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow-y: auto; padding: 20px; }
        .detail-panel h2 { font-size: 1.2rem; color: #fff; margin-bottom: 16px; }
        .detail-empty { text-align: center; color: #484f58; padding: 60px 20px; font-size: 0.9rem; }

        /* Section cards */
        .section-card { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .section-card h3 { font-size: 0.9rem; color: #d2a8ff; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .section-card h3 .count { font-size: 0.7rem; background: #21262d; color: #8b949e; padding: 1px 8px; border-radius: 10px; }

        /* Diary cards */
        .diary-item { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .diary-item .meta { font-size: 0.72rem; color: #8b949e; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .diary-item .content { font-size: 0.82rem; color: #e1e4e8; line-height: 1.5; }
        .diary-item .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }

        /* Chat bubbles */
        .chat-container { max-height: 300px; overflow-y: auto; padding: 8px 0; }
        .chat-bubble { max-width: 70%; padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 0.82rem; line-height: 1.4; }
        .chat-bubble.me { background: #E37474; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-bubble.other { background: #21262d; color: #e1e4e8; border-bottom-left-radius: 4px; }
        .chat-bubble .sender { font-size: 0.68rem; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
        .chat-bubble .time { font-size: 0.65rem; opacity: 0.6; margin-top: 2px; text-align: right; }

        /* Exchange turn */
        .turn-item { display: flex; gap: 10px; margin-bottom: 10px; }
        .turn-num { min-width: 28px; height: 28px; background: #238636; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
        .turn-content { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; }
        .turn-content .writer { font-size: 0.72rem; color: #58a6ff; margin-bottom: 4px; }
        .turn-content .text { font-size: 0.8rem; color: #e1e4e8; }
        .turn-content .reaction { font-size: 0.75rem; color: #d29922; margin-top: 4px; }

        /* Matching flow */
        .match-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 6px; font-size: 0.82rem; }
        .match-arrow { color: #58a6ff; font-weight: 700; }

        /* Badge */
        .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; }
        .b-green { background: #0d3117; color: #3fb950; border: 1px solid #238636; }
        .b-yellow { background: #3d1f00; color: #f0883e; border: 1px solid #9e6a03; }
        .b-red { background: #3d0f0f; color: #f85149; border: 1px solid #da3633; }
        .b-blue { background: #0d1d3a; color: #58a6ff; border: 1px solid #388bfd; }
        .b-gray { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
        .b-purple { background: #1c1230; color: #d2a8ff; border: 1px solid #6e40aa; }
        .b-pink { background: #3d0f2a; color: #f778ba; border: 1px solid #da3633; }

        .api-btn { background: #21262d; border: 1px solid #388bfd; color: #58a6ff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: all 0.15s; }
        .api-btn:hover { background: #388bfd; color: #fff; }
        .footer { margin-top: 20px; text-align: center; color: #484f58; font-size: 0.72rem; }
    </style>
</head>
<body>
<div class="container">
    <h1><span class="live-dot"></span>Ember DB 실시간 대시보드</h1>
    <p class="subtitle">유저를 클릭하면 해당 유저의 일기, 매칭, 교환일기, 채팅을 한눈에 볼 수 있습니다. 5초마다 자동 갱신.</p>

    <div class="status-bar">
        <span id="lastUpdate">갱신 중...</span>
        <button class="refresh-btn" onclick="loadAll()">새로고침</button>
        <span id="connStatus"></span>
    </div>

    <div class="summary" id="summary"></div>

    <!-- Dev 도구 (독립 섹션) -->
    <div style="background:#161b22;border:1px solid #f0883e40;border-radius:12px;padding:16px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
            <span style="font-size:1rem;font-weight:600;color:#f0883e;">Dev 도구</span>
            <span id="devSelectedUser" style="font-size:0.82rem;color:#58a6ff;background:#0d1117;padding:3px 10px;border-radius:6px;">유저 미선택</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
            <span style="font-size:0.75rem;color:#8b949e;">시드 일기:</span>
            <label style="font-size:0.72rem;color:#8b949e;">일수</label>
            <input id="seedDays" type="number" value="7" min="1" max="30" style="width:50px;background:#0d1117;border:1px solid #30363d;color:#58a6ff;padding:4px 8px;border-radius:6px;font-size:0.78rem;">
            <label style="font-size:0.72rem;color:#8b949e;">딜레이(ms)</label>
            <input id="seedDelay" type="number" value="500" min="100" max="3000" step="100" style="width:65px;background:#0d1117;border:1px solid #30363d;color:#58a6ff;padding:4px 8px;border-radius:6px;font-size:0.78rem;">
            <button onclick="seedForSelected()" class="api-btn" style="border-color:#f0883e;color:#f0883e;font-weight:600;">시드 생성</button>
            <button onclick="deleteSelectedUserDiaries()" class="api-btn" style="border-color:#da3633;color:#da3633;">일기 전체 삭제</button>
            <button onclick="deleteSelectedUser()" class="api-btn" style="border-color:#da3633;color:#da3633;">유저 삭제</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
            <span style="font-size:0.75rem;color:#8b949e;">유저 생성:</span>
            <button onclick="createTestUser()" class="api-btn" style="border-color:#3fb950;color:#3fb950;">새 유저 (GUEST)</button>
            <button onclick="createTestUserFull()" class="api-btn" style="border-color:#3fb950;color:#3fb950;">유저 + 온보딩 완료</button>
        </div>
        <div id="seedProgress" style="font-size:0.75rem;color:#8b949e;min-height:20px;"></div>
    </div>

    <div class="main-layout">
        <!-- 좌측: 유저 목록 -->
        <div class="user-list" id="userList">
            <div class="user-list-header">유저 목록</div>
        </div>

        <!-- 우측: 상세 패널 -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-empty">← 왼쪽에서 유저를 선택하세요</div>
        </div>
    </div>

    <div class="footer">Ember DB Dashboard | 5초 자동갱신 + Supabase Realtime</div>
</div>

<script>
const SUPABASE_URL = 'https://bnglgtmnwoypjbkiymjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZ2xndG1ud295cGpia2l5bWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTI0NzIsImV4cCI6MjA4OTg2ODQ3Mn0.cZ4nrrFor_ucfGgEMz9Y9aKeaXKjLQhwOV9c6PffGFI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── 팀원 계정 ──
const TEAM_MEMBERS = {
    59: { name: '박종수', emoji: '🔵' },
    8:  { name: '박종수(구)', emoji: '🔵' },
    58: { name: '한은진', emoji: '🟣' },
    60: { name: '김주영', emoji: '🟡' },
    61: { name: '이동원', emoji: '🟢' },
    25: { name: '이동원(구)', emoji: '🟢' },
};

// ── 전역 데이터 ──
let allUsers = [];
let allDiaries = [];
let allMatchings = [];
let allExRooms = [];
let allExDiaries = [];
let allChatRooms = [];
let allMessages = [];
let allCouples = [];
let allNotifications = [];
let allKeywords = [];
let selectedUserId = null;
let lastApiResult = { text: '버튼을 클릭하면 배포 서버 API 결과가 여기에 표시됩니다.', color: '#8b949e' };

// ── 유틸 ──
function statusBadge(status) {
    if (!status) return '';
    const map = {
        'ACTIVE':'b-green','MATCHED':'b-green','ACCEPTED':'b-green','ANALYZED':'b-green',
        'COMPLETED':'b-green','COUPLE_CONFIRMED':'b-green','CHAT_CREATED':'b-blue',
        'PENDING':'b-yellow','ANALYZING':'b-yellow','IN_PROGRESS':'b-yellow','WAITING_NEXT_STEP':'b-yellow',
        'EXPIRED':'b-red','REJECTED':'b-red','FAILED':'b-red','CANCELLED':'b-red','ENDED':'b-red',
        'DEACTIVATED':'b-red','CHAT_CONNECTED':'b-blue',
        'ROLE_USER':'b-green','ROLE_GUEST':'b-yellow',
        'MALE':'b-blue','FEMALE':'b-pink',
        'EXCHANGE_ONLY':'b-purple','PRIVATE':'b-gray',
    };
    return `<span class="badge ${map[status]||'b-gray'}">${status}</span>`;
}
function timeAgo(d) {
    if (!d) return '-';
    const diff = (Date.now() - new Date(d).getTime()) / 1000;
    if (diff < 60) return Math.floor(diff)+'초 전';
    if (diff < 3600) return Math.floor(diff/60)+'분 전';
    if (diff < 86400) return Math.floor(diff/3600)+'시간 전';
    return Math.floor(diff/86400)+'일 전';
}
function truncate(s, n=60) { return s && s.length > n ? s.slice(0,n)+'...' : (s||'-'); }
function getUserName(id) {
    const team = TEAM_MEMBERS[id];
    const u = allUsers.find(u => u.id === id);
    const nick = u ? (u.nickname || u.real_name || `유저${id}`) : `유저${id}`;
    return team ? `${team.emoji}${nick}(${team.name})` : nick;
}

// ── 데이터 로드 ──
async function loadAll() {
    try {
        const [r1,r2,r3,r4,r5,r6,r7,r8,r9,r10] = await Promise.all([
            sb.from('users').select('id,nickname,real_name,gender,sido,role,status,created_at').order('id',{ascending:false}).limit(60),
            sb.from('diaries').select('id,user_id,content,analysis_status,visibility,created_at').order('id',{ascending:false}).limit(100),
            sb.from('matchings').select('id,from_user_id,to_user_id,diary_id,status,created_at,matched_at').order('id',{ascending:false}).limit(60),
            sb.from('exchange_rooms').select('id,user_a_id,user_b_id,status,turn_count,round_count,current_turn_user_id,deadline_at,created_at').order('id',{ascending:false}).limit(40),
            sb.from('exchange_diaries').select('id,room_id,author_id,content,turn_number,reaction,created_at').order('id',{ascending:false}).limit(80),
            sb.from('chat_rooms').select('id,user_a_id,user_b_id,status,exchange_room_id,created_at').order('id',{ascending:false}).limit(30),
            sb.from('messages').select('id,chat_room_id,sender_id,content,type,is_read,created_at').order('created_at',{ascending:false}).limit(100),
            sb.from('couples').select('*').order('id',{ascending:false}).limit(20),
            sb.from('notifications').select('id,user_id,type,title,body,is_read,sent_at').order('id',{ascending:false}).limit(60),
            sb.from('diary_keywords').select('*').limit(200),
        ]);

        allUsers = r1.data || [];
        allDiaries = r2.data || [];
        allMatchings = r3.data || [];
        allExRooms = r4.data || [];
        allExDiaries = r5.data || [];
        allChatRooms = r6.data || [];
        allMessages = r7.data || [];
        allCouples = r8.data || [];
        allNotifications = r9.data || [];
        allKeywords = r10.data || [];

        renderSummary();
        renderUserList();
        if (selectedUserId) renderDetail(selectedUserId);

        document.getElementById('lastUpdate').textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR');
        document.getElementById('connStatus').innerHTML = '<span class="live-dot"></span>연결됨';
    } catch(e) {
        document.getElementById('connStatus').textContent = '오류: ' + e.message;
    }
}

function renderSummary() {
    document.getElementById('summary').innerHTML = [
        {num: allUsers.length, label:'유저'},
        {num: allDiaries.length, label:'일기'},
        {num: allMatchings.filter(m=>m.status==='MATCHED').length, label:'매칭 성사'},
        {num: allExRooms.length, label:'교환방'},
        {num: allChatRooms.length, label:'채팅방'},
        {num: allMessages.length, label:'메시지'},
        {num: allCouples.length, label:'커플'},
        {num: allMatchings.filter(m=>m.status==='PENDING').length, label:'대기중'},
    ].map(s=>`<div class="sum-card"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('');
}

function renderUserList() {
    const list = document.getElementById('userList');
    const header = '<div class="user-list-header">유저 목록 ('+allUsers.length+'명)</div>';
    const items = allUsers.map(u => {
        const diaryCount = allDiaries.filter(d => d.user_id === u.id).length;
        const matchCount = allMatchings.filter(m => m.from_user_id === u.id || m.to_user_id === u.id).length;
        const isActive = u.id === selectedUserId;
        const team = TEAM_MEMBERS[u.id];
        const teamTag = team ? `<span style="font-size:0.72rem;background:#1c2128;padding:1px 6px;border-radius:4px;color:#58a6ff;">${team.emoji} ${team.name}</span>` : '';
        return `<div class="user-item ${isActive?'active':''}" onclick="selectUser(${u.id})" ${team ? 'style="border-left:3px solid #58a6ff;"' : ''}>
            <div class="name">${u.nickname || u.real_name || '(미설정)'} <span style="color:#8b949e;font-size:0.72rem;">#${u.id}</span> ${teamTag}</div>
            <div class="info">${u.sido||'-'} · 일기 ${diaryCount}개 · 매칭 ${matchCount}건</div>
            <div class="badges">${statusBadge(u.gender)} ${statusBadge(u.role)}</div>
        </div>`;
    }).join('');
    list.innerHTML = header + items;
}

function selectUser(userId) {
    selectedUserId = userId;
    renderUserList();
    renderDetail(userId);
    // Dev 도구 선택 유저 표시
    const u = allUsers.find(u => u.id === userId);
    const name = u ? (u.nickname || u.real_name || '유저') : '유저';
    const el = document.getElementById('devSelectedUser');
    if (el) el.innerHTML = `<span style="color:#fff;font-weight:600;">${name}</span> <span style="color:#8b949e;">#${userId}</span>`;
}

function seedForSelected() {
    if (!selectedUserId) { document.getElementById('seedProgress').innerHTML = '<span style="color:#f85149;">유저를 먼저 선택하세요</span>'; return; }
    seedDiaries(selectedUserId);
}
function deleteSelectedUserDiaries() {
    if (!selectedUserId) { document.getElementById('seedProgress').innerHTML = '<span style="color:#f85149;">유저를 먼저 선택하세요</span>'; return; }
    deleteUserDiaries(selectedUserId);
}
function deleteSelectedUser() {
    if (!selectedUserId) { document.getElementById('seedProgress').innerHTML = '<span style="color:#f85149;">유저를 먼저 선택하세요</span>'; return; }
    deleteUser(selectedUserId);
}

function renderDetail(userId) {
    const panel = document.getElementById('detailPanel');
    const user = allUsers.find(u => u.id === userId);
    if (!user) { panel.innerHTML = '<div class="detail-empty">유저를 찾을 수 없습니다</div>'; return; }

    let html = `<h2>${user.nickname || user.real_name || '유저'} #${user.id}</h2>`;
    html += `<div style="margin-bottom:16px;font-size:0.82rem;color:#8b949e;">
        ${statusBadge(user.gender)} ${statusBadge(user.role)} ${statusBadge(user.status)} ·
        ${user.sido||'-'} · 가입 ${timeAgo(user.created_at)}
    </div>`;

    // ── 먼저 유저 관련 데이터 집계 (API 테스트에서 사용) ──
    const userDiaries = allDiaries.filter(d => d.user_id === userId);
    const userMatchings = allMatchings.filter(m => m.from_user_id === userId || m.to_user_id === userId);
    const userExRooms = allExRooms.filter(r => r.user_a_id === userId || r.user_b_id === userId);
    const userChatRooms = allChatRooms.filter(c => c.user_a_id === userId || c.user_b_id === userId);
    const userCouples = allCouples.filter(c => c.user_a_id === userId || c.user_b_id === userId);
    const userNotifs = allNotifications.filter(n => n.user_id === userId);
    const userDiaryId = userDiaries.length > 0 ? userDiaries[0].id : 0;

    // ── API 테스트 섹션 (맨 위) ──
    const exRoomId = userExRooms.length > 0 ? userExRooms[0].id : 0;
    const chatRoomId = userChatRooms.length > 0 ? userChatRooms[0].id : 0;

    html += `<div class="section-card" style="border:2px solid #58a6ff;">
        <h3 style="color:#58a6ff;">API 테스트 (이 유저로 로그인) <span style="font-size:0.7rem;color:#8b949e;">결과는 하단에 유지됩니다</span></h3>

        <div style="font-size:0.72rem;color:#d2a8ff;margin-bottom:8px;">탐색 / 매칭</div>
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center;">
            <span style="font-size:0.7rem;color:#8b949e;">필터:</span>
            <select id="filterSido" style="background:#0d1117;border:1px solid #30363d;color:#58a6ff;padding:4px 8px;border-radius:6px;font-size:0.72rem;">
                <option value="">지역 전체</option>
                <option value="서울특별시">서울</option>
                <option value="경기도">경기</option>
                <option value="부산광역시">부산</option>
                <option value="대전광역시">대전</option>
                <option value="인천광역시">인천</option>
            </select>
            <select id="filterAge" style="background:#0d1117;border:1px solid #30363d;color:#58a6ff;padding:4px 8px;border-radius:6px;font-size:0.72rem;">
                <option value="">연령 전체</option>
                <option value="20대">20대</option>
                <option value="30대">30대</option>

// ── API 테스트 ──
const API_BASE = 'https://ember-app.duckdns.org';
let cachedTokens = {};

async function getToken(userId) {
    if (cachedTokens[userId]) return cachedTokens[userId];
    const res = await fetch(`${API_BASE}/api/dev/token?userId=${userId}`);
    const data = await res.json();
    const token = data.data?.accessToken || data.accessToken;
    cachedTokens[userId] = token;
    return token;
}

async function apiTestExplore(userId) {
    const sido = document.getElementById('filterSido').value;
    const ageGroup = document.getElementById('filterAge').value;
    const params = new URLSearchParams();
    if (sido) params.set('sido', sido);
    if (ageGroup) params.set('ageGroup', ageGroup);
    const filterLabel = [sido || '전체지역', ageGroup || '전체연령'].join(' + ');
    document.getElementById('filterInfo').textContent = `→ ${filterLabel}`;

    const resultEl = document.getElementById('apiResult');
    resultEl.textContent = '로딩 중...';
    resultEl.style.color = '#d29922';
    try {
        const token = await getToken(userId);
        const url = `${API_BASE}/api/diaries/explore${params.toString() ? '?' + params.toString() : ''}`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
        const data = await res.json();
        const count = data.data?.diaries?.length || 0;
        if (res.ok) {
            setResult(`✓ ${res.status} OK — 탐색 [${filterLabel}] → ${count}건\n\n` + JSON.stringify(data, null, 2), '#3fb950');
        } else {
            setResult(`✗ ${res.status} ERROR — 탐색 [${filterLabel}]\n\n` + JSON.stringify(data, null, 2), '#f85149');
        }
    } catch(e) { setResult('요청 실패: ' + e.message, '#f85149'); }
}

async function apiTestExploreCompare(userId) {
    const resultEl = document.getElementById('apiResult');
    resultEl.textContent = '필터 조합별 비교 로딩 중...';
    resultEl.style.color = '#d29922';
    try {
        const token = await getToken(userId);
        const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
        const combos = [
            { label: '전체', params: '' },
            { label: '서울', params: '?sido=서울특별시' },
            { label: '경기', params: '?sido=경기도' },
            { label: '부산', params: '?sido=부산광역시' },
            { label: '20대', params: '?ageGroup=20대' },
            { label: '30대', params: '?ageGroup=30대' },
            { label: '서울+20대', params: '?sido=서울특별시&ageGroup=20대' },
            { label: '서울+30대', params: '?sido=서울특별시&ageGroup=30대' },
            { label: '경기+20대', params: '?sido=경기도&ageGroup=20대' },
            { label: '부산+20대', params: '?sido=부산광역시&ageGroup=20대' },
        ];
        let output = `필터 조합별 탐색 결과 (유저 #${userId})\n${'═'.repeat(50)}\n\n`;
        for (const c of combos) {
            const res = await fetch(`${API_BASE}/api/diaries/explore${c.params}`, { headers: h });
            const data = await res.json();
            const count = data.data?.diaries?.length || 0;
            const status = res.ok ? '✓' : '✗';
            const names = (data.data?.diaries || []).map(d => {
                const u = allUsers.find(u => u.id === d.authorId);
                return u ? (u.nickname || '?') : `유저${d.authorId}`;
            }).slice(0, 5).join(', ');
            output += `${status} [${c.label.padEnd(10)}] → ${String(count).padStart(2)}건  ${names ? '(' + names + (count > 5 ? '...' : '') + ')' : ''}\n`;
        }
        setResult(output, '#3fb950');
    } catch(e) { setResult('요청 실패: ' + e.message, '#f85149'); }
}

        const data = await res.json();

        if (res.ok) {
            setResult(`✓ ${res.status} OK — ${apiLabel}\n\n` + JSON.stringify(data, null, 2), '#3fb950');
        } else {
            setResult(`✗ ${res.status} ERROR — ${apiLabel}\n\n` + JSON.stringify(data, null, 2), '#f85149');
        }
    } catch(e) {
        setResult('요청 실패: ' + e.message, '#f85149');
    }
}

function setResult(text, color) {
    lastApiResult = { text, color };
    const el = document.getElementById('apiResult');
    if (el) { el.textContent = text; el.style.color = color; }
}

function formatDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function seedDiaries(userId) {
    const days = parseInt(document.getElementById('seedDays').value) || 7;
    const delay = parseInt(document.getElementById('seedDelay').value) || 500;
    const prog = document.getElementById('seedProgress');
    const today = new Date();

    let success = 0, skipped = 0, failed = 0;
    prog.innerHTML = `<span style="color:#d29922;">생성 중... (유저 #${userId}, ${days}일)</span>`;

    for (let d = days - 1; d >= 0; d--) {
        const date = new Date(today);
        date.setDate(date.getDate() - d);
        const dateStr = formatDateStr(date);
        const content = SEED_DIARIES[(userId * 7 + d) % SEED_DIARIES.length];

        try {
            const res = await fetch(`${API_BASE}/api/dev/diaries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, content, date: dateStr }),
            });
            const data = await res.json();
            if (data.error === 'DUPLICATE') { skipped++; }
            else if (data.diaryId) { success++; }
            else { failed++; }
        } catch { failed++; }

        prog.innerHTML = `<span style="color:#d29922;">유저 #${userId}: ${days - d}/${days} (성공:${success} 스킵:${skipped} 실패:${failed})</span>`;
        await new Promise(r => setTimeout(r, delay));
    }

    prog.innerHTML = `<span style="color:#3fb950;">완료! 유저 #${userId} — 성공:${success} 스킵:${skipped} 실패:${failed} (AI 분석 5~10초 후 반영)</span>`;
    setTimeout(loadAll, 3000);
}

async function deleteUserDiaries(userId) {

        const res = await fetch(`${API_BASE}/api/dev/users/${userId}/diaries`, { method: 'DELETE' });

            prog.innerHTML = `<span style="color:#3fb950;">유저 #${userId} 일기 삭제 완료 (${data.deletedRows}건)</span>`;

        }
    } catch(e) { prog.innerHTML = `<span style="color:#f85149;">삭제 실패: ${e.message}</span>`; }
    setTimeout(loadAll, 1000);
}

async function seedDiariesAll() {
    const days = parseInt(document.getElementById('seedDays').value) || 7;
    const delay = parseInt(document.getElementById('seedDelay').value) || 500;
    const prog = document.getElementById('seedProgress');

    const userIds = allUsers.filter(u => u.status === 'ACTIVE' && u.role === 'ROLE_USER').map(u => u.id);
    if (userIds.length === 0) { prog.innerHTML = '<span style="color:#f85149;">활성 유저 없음</span>'; return; }

    let totalSuccess = 0, totalSkipped = 0, totalFailed = 0;
    prog.innerHTML = `<span style="color:#d29922;">전체 시드 생성 시작 (${userIds.length}명, ${days}일)</span>`;

    for (const userId of userIds) {
        const today = new Date();
        for (let d = days - 1; d >= 0; d--) {
            const date = new Date(today);
            date.setDate(date.getDate() - d);
            const dateStr = formatDateStr(date);
            const content = SEED_DIARIES[(userId * 7 + d) % SEED_DIARIES.length];

            try {
                const res = await fetch(`${API_BASE}/api/dev/diaries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, content, date: dateStr }),
                });
                const data = await res.json();
                if (data.error === 'DUPLICATE') { totalSkipped++; }
                else if (data.diaryId) { totalSuccess++; }
                else { totalFailed++; }
            } catch { totalFailed++; }

            await new Promise(r => setTimeout(r, delay));
        }
        prog.innerHTML = `<span style="color:#d29922;">진행 중... 유저 #${userId} 완료 (성공:${totalSuccess} 스킵:${totalSkipped} 실패:${totalFailed})</span>`;
    }

    prog.innerHTML = `<span style="color:#3fb950;">전체 완료! ${userIds.length}명 — 성공:${totalSuccess} 스킵:${totalSkipped} 실패:${totalFailed}</span>`;
    setTimeout(loadAll, 3000);
}

}
